version: 2

models:
  - name: fct_orders
    description: >
      Core fact table of the warehouse. One row per order, enriched with
      customer and product attributes from the staging layer. Materialized
      as an incremental model — only new orders (by order_date) are processed
      on each dbt run after the initial full build.
    columns:
      - name: order_id
        description: Unique order identifier. Primary key of this table.
        tests:
          - not_null
          - unique

      - name: customer_id
        description: Foreign key to dim_customers.
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id

      - name: product_id
        description: Foreign key to dim_products.
        tests:
          - not_null
          - relationships:
              to: ref('stg_products')
              field: product_id

      - name: order_date
        description: Date the order was placed.
        tests:
          - not_null

      - name: quantity
        description: Number of units ordered.
        tests:
          - not_null

      - name: unit_price
        description: Unit price in dollars.
        tests:
          - not_null

      - name: total_amount
        description: Derived column — quantity × unit_price.
        tests:
          - not_null

      - name: status
        description: Order status (DELIVERED, SHIPPED, CANCELLED, RETURNED).
        tests:
          - not_null
          - accepted_values:
              values: ['DELIVERED', 'SHIPPED', 'CANCELLED', 'RETURNED']

      - name: customer_name
        description: Denormalized full name from stg_customers.

      - name: customer_country
        description: Denormalized country from stg_customers.

      - name: product_name
        description: Denormalized product name from stg_products.

      - name: product_category
        description: Denormalized product category from stg_products.

      - name: brand
        description: Denormalized brand from stg_products.

  - name: dim_customers
    description: >
      Customer dimension table with aggregated order metrics.
      One row per customer. Metrics are calculated from fct_orders
      and include lifetime value, total orders, return rate, and order dates.
    columns:
      - name: customer_id
        description: Unique customer identifier. Primary key.
        tests:
          - not_null
          - unique

      - name: full_name
        description: Customer full name (first + last).
        tests:
          - not_null

      - name: email
        description: Customer email address (lowercase).

      - name: country
        description: Customer country (Title Case).

      - name: signup_date
        description: Date the customer registered.

      - name: first_order_date
        description: Date of the customer's first order.

      - name: last_order_date
        description: Date of the customer's most recent order.

      - name: total_orders
        description: Total number of orders placed by this customer.

      - name: completed_orders
        description: Number of orders with status DELIVERED.

      - name: lifetime_value
        description: Total revenue generated by this customer across all orders.

      - name: avg_order_value
        description: Average order value for this customer.

      - name: return_rate_pct
        description: Percentage of orders returned (0–100).

  - name: dim_products
    description: >
      Product dimension table with aggregated sales metrics.
      One row per product. Metrics calculated from fct_orders.
    columns:
      - name: product_id
        description: Unique product identifier. Primary key.
        tests:
          - not_null
          - unique

      - name: product_name
        description: Product display name.
        tests:
          - not_null

      - name: category
        description: Product category (Title Case).
        tests:
          - not_null

      - name: brand
        description: Product brand name.

      - name: total_orders
        description: Total number of orders containing this product.

      - name: total_units_sold
        description: Total units sold across all orders and statuses.

      - name: confirmed_units_sold
        description: Units sold where order status is DELIVERED only.

      - name: total_revenue
        description: Total revenue generated by this product.

      - name: avg_selling_price
        description: Average unit price across all orders for this product.

  - name: monthly_revenue
    description: >
      Executive summary table aggregated by calendar month.
      The primary table powering the Databricks SQL Analytics dashboards.
      Excludes cancelled and returned orders from revenue calculations.
    columns:
      - name: month
        description: First day of the calendar month (date type).
        tests:
          - not_null
          - unique

      - name: order_count
        description: Number of distinct orders in this month.
        tests:
          - not_null

      - name: unique_customers
        description: Number of distinct customers who ordered in this month.

      - name: total_units_sold
        description: Total units sold (shipped + delivered only).

      - name: total_revenue
        description: Total revenue for the month (shipped + delivered orders).
        tests:
          - not_null

      - name: avg_order_value
        description: Average order value for the month.

      - name: revenue_per_customer
        description: Total revenue divided by unique customers.

      - name: top_category
        description: Product category with the highest revenue this month.

      - name: top_category_revenue
        description: Revenue generated by the top category this month.
