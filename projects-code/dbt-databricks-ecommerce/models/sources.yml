version: 2

sources:
  - name: ecommerce_bronze
    description: >
      Raw e-commerce data loaded via dbt seed into the Bronze layer.
      These tables represent the untouched, unvalidated source data exactly
      as it arrives — quality issues and all.
    database: dev
    schema: ecommerce_bronze

    # Freshness config: in a real pipeline, this tells dbt to warn/error
    # if data hasn't been loaded recently. Great for monitoring upstream pipelines.
    freshness:
      warn_after: {count: 24, period: hour}
      error_after: {count: 48, period: hour}
    loaded_at_field: "current_timestamp()"

    tables:
      - name: raw_orders
        description: >
          Raw order transactions. Contains intentional quality issues
          for educational purposes: duplicate order_ids, a negative quantity,
          a null order_id, and mixed-case status values.
        columns:
          - name: order_id
            description: Unique order identifier. Nullable in raw source.
          - name: customer_id
            description: Foreign key to raw_customers.
          - name: product_id
            description: Foreign key to raw_products.
          - name: order_date
            description: Date the order was placed (YYYY-MM-DD string).
          - name: quantity
            description: Units ordered. Can be negative in raw source (data quality issue).
          - name: unit_price_cents
            description: Unit price in cents (integer). Converted to dollars in staging.
          - name: status
            description: Order status. Mixed case in raw source (e.g. SHIPPED vs shipped).
          - name: payment_method
            description: Payment method used for the order.

      - name: raw_customers
        description: >
          Raw customer records. Contains intentional quality issues:
          duplicate customer_id C003, inconsistent country casing.
        columns:
          - name: customer_id
            description: Customer identifier. Not unique in raw source (duplicates present).
          - name: first_name
            description: Customer first name. May contain leading/trailing whitespace.
          - name: last_name
            description: Customer last name.
          - name: email
            description: Customer email address.
          - name: signup_date
            description: Date customer registered (YYYY-MM-DD string).
          - name: country
            description: Country name. Inconsistent casing in raw source.

      - name: raw_products
        description: >
          Raw product catalog. Contains intentional quality issues:
          inconsistent category casing (Electronics vs electronics vs ELECTRONICS).
        columns:
          - name: product_id
            description: Unique product identifier.
          - name: product_name
            description: Product display name. May contain leading/trailing whitespace.
          - name: category
            description: Product category. Inconsistent casing in raw source.
          - name: brand
            description: Product brand name.
